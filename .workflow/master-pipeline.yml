# Gitee CI 配置 - Android Gradle 项目
version: '1.0'

# 使用 Gitee Go 的 Android 构建镜像
image: registry.cn-hangzhou.aliyuncs.com/gitee-go/android:latest

stages:
  - build

before_script:
  # 赋予 gradlew 执行权限
  - chmod +x ./gradlew
  # 打印环境信息（可选）
  - java -version
  - ./gradlew --version

build:
  stage: build
  script:
    # 使用 gradlew 编译 Debug APK
    - ./gradlew assembleDebug --stacktrace --no-daemon
  artifacts:
    paths:
      # 收集编译产物（APK）
      - app/build/outputs/apk/debug/*.apk
    expire_in: 7 days
  only:
    - master
    - develop
    - tags